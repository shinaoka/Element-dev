# CI/CD for the monorepo Windows desktop build (same pipeline as build-local-exe.ps1).
#
# Prerequisites: Rust, NASM, Tcl, MSVC (ilammy/msvc-dev-cmd), Node (pnpm + Yarn for seshat), Python for node-gyp.
#
# Private git submodules: this workflow rewrites git@github.com SSH URLs to HTTPS and uses
# GITHUB_TOKEN. If submodules are outside the token's scope, add repository secret SUBMODULES_TOKEN (PAT).

name: Build Windows desktop

on:
    workflow_dispatch:
    push:
        branches: [main, master, develop]
    pull_request:
        branches: [main, master, develop]

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

permissions:
    contents: write # upload-artifact + update latest-windows release assets
    actions: write # rust-cache / setup-node pnpm cache save

env:
    # Skip code signing on CI (no Apple/Windows cert); avoids electron-builder signing failures.
    CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
    build:
        name: Windows x64 (local element-web + seshat)
        runs-on: windows-latest
        timeout-minutes: 120
        defaults:
            run:
                shell: pwsh

        steps:
            - name: Checkout (no submodules yet)
              uses: actions/checkout@v4
              with:
                  submodules: false

            - name: Init submodules (SSH URL -> HTTPS + token for private repos)
              env:
                  TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config --global url."https://github.com/".insteadOf "git@github.com:"
                  git config --global url."https://x-access-token:${env:TOKEN}@github.com/".insteadOf "https://github.com/"
                  git submodule sync --recursive
                  git submodule update --init --force --recursive

            - name: Install Chocolatey packages (NASM, Tcl, Perl)
              run: |
                  choco install -y nasm magicsplat-tcl-tk strawberryperl --no-progress
                  echo "C:/Program Files/NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                  echo "$env:HOME/AppData/Local/Apps/Tcl86/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                  echo "C:/Strawberry/perl/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

            - name: Install Rust
              env:
                  CARGO_INCREMENTAL: 0
              run: |
                  rustup toolchain install stable --profile minimal --no-self-update
                  rustup default stable
                  rustup target add x86_64-pc-windows-msvc

            # After rustup (cache key includes rustc version). Caches ~/.cargo/registry + seshat/target deps.
            - name: Cache Rust (seshat workspace)
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: seshat
                  # Also cache workspace libs (seshat + matrix-seshat); speeds repeat runs when lockfiles unchanged.
                  cache-workspace-crates: "true"

            - name: Cache seshat-node (Yarn)
              uses: actions/cache@v4
              with:
                  path: seshat/seshat-node/node_modules
                  key: ${{ runner.os }}-seshat-node-yarn-${{ hashFiles('seshat/seshat-node/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-seshat-node-yarn-

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.32.1

            - name: Use Node (element-web monorepo + desktop app)
              uses: actions/setup-node@v4
              with:
                  node-version-file: element-web/apps/desktop/.node-version
                  cache: pnpm
                  cache-dependency-path: element-web/pnpm-lock.yaml

            - name: Install Yarn classic (seshat-node)
              run: npm install -g yarn@1.22.22

            - name: Yarn network timeout
              run: yarn config set network-timeout 300000

            - name: Set up Python (node-gyp)
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: MSVC environment (C++ build tools for seshat / native deps)
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: x64

            - name: Build (build-local-exe.ps1)
              working-directory: ${{ github.workspace }}
              run: |
                  Set-StrictMode -Version Latest
                  $ErrorActionPreference = 'Stop'
                  ./build-local-exe.ps1 -x64

            - name: Upload installer artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: element-desktop-windows-dist
                  path: element-web/apps/desktop/dist
                  if-no-files-found: error
                  retention-days: 14

            # Publish installers to https://github.com/shinaoka/Element-dev/releases/tag/latest-windows
            # (PRs and non-main branches keep artifacts as workflow artifacts only.)
            - name: Point latest-windows tag at this commit
              if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh api --method PATCH "repos/${{ github.repository }}/git/refs/tags/latest-windows" -f sha="${{ github.sha }}" -f force=true

            - name: Upload binaries to latest-windows release
              if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  $dist = "element-web/apps/desktop/dist"
                  $paths = [System.Collections.Generic.List[string]]::new()
                  foreach ($pat in @("*.exe", "*.msi", "*.yml", "*.yaml", "*.nupkg")) {
                      Get-ChildItem -Path $dist -Filter $pat -File -ErrorAction SilentlyContinue |
                          ForEach-Object { $paths.Add($_.FullName) }
                  }
                  $releases = Join-Path $dist "RELEASES"
                  if (Test-Path -LiteralPath $releases) {
                      $paths.Add($releases)
                  }
                  if ($paths.Count -eq 0) {
                      throw "No release files (*.exe, *.msi, *.yml, *.nupkg, RELEASES) found under $dist"
                  }
                  gh release upload latest-windows @($paths.ToArray()) --clobber
